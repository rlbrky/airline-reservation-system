<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/nav :: head('Bookings')}"></head>
<body>
    <nav th:replace="~{fragments/adminNav :: navbar}"></nav>

    <div class="container">

        <h1>Bookings</h1>
        <table class="bookings" th:if="${bookings != null and !bookings.isEmpty()}">
            <thead>
                <tr>
                    <th>Reference</th>
                    <th>User</th>
                    <th>Flight</th>
                    <th>Seat</th>
                    <th>Status</th>
                    <th>Booked At</th>
                    <th>Price Paid</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.bookingReference}"></td>
                    <td th:text="${booking.user.username}"></td>
                    <td th:text="${booking.flight.origin.city + ' -> ' + booking.flight.destination.city}"></td>
                    <td th:text="${booking.seat.seatNumber}"></td>
                    <td th:text="${booking.bookingStatus}"></td>
                    <td th:text="${booking.bookedAt}"></td>
                    <td th:text="${booking.pricePaid}"></td>
                    <td>
                        <form th:if="${booking.bookingStatus.name() == 'CONFIRMED'}"
                              th:action="@{/admin/bookings/{ref}/cancel(ref=${booking.bookingReference})}" method="post">
                            <button class="booking-cancel" type="submit">Cancel</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
