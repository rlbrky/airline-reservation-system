spring.application.name=airline-reservation-system

# Datasource — password comes from the AIRLINE_DB_PASSWORD env var, never committed
spring.datasource.url=jdbc:mysql://localhost:3306/airline_reservation
spring.datasource.username=airline_user
spring.datasource.password=${AIRLINE_DB_PASSWORD}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Set dev profile
spring.profiles.active=dev