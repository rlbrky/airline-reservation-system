# In-memory H2 for tests — isolated from the real MySQL.
# DB_CLOSE_DELAY=-1 keeps the DB alive across the multiple pooled connections
# the concurrency test's threads use. MODE=MySQL makes H2 behave like MySQL.
spring.datasource.url=jdbc:h2:mem:airline;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
